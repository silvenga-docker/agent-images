services:
  agent:
    build: .
    image: agent-image
    container_name: agent
    ports:
      - "4096:4096"
      - "3000:3000"
    volumes:
      - agent-home:/home/agent
      - docker-data:/var/lib/docker
    restart: unless-stopped
    # runtime: sysbox-runc  # Enable when running with Sysbox for full VM-like isolation

volumes:
  agent-home:
  docker-data:
