services:
  agent:
    build: .
    image: agent-image
    container_name: agent
    ports:
      - "4096:4096"
      - "3000:3000"
    volumes:
      - agent-home:/home/agent
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - label=disable

volumes:
  agent-home:
