name: "PR Validation"
on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: agent-image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker compose up -d

      - name: Wait for container to be healthy
        timeout-minutes: 10
        run: |
          while true; do
            status=$(docker inspect -f "{{.State.Health.Status}}" agent 2>/dev/null)
            case "$status" in
              healthy)
                echo "Container is healthy"
                exit 0
                ;;
              unhealthy)
                echo "::error::Container became unhealthy"
                docker compose logs 2>/dev/null || true
                exit 1
                ;;
              *)
                sleep 2
                ;;
            esac
          done

      - name: Cleanup
        if: always()
        run: docker compose down || true
