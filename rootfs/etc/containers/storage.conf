[storage]
# "overlay" uses native kernel overlayfs-in-userns (Linux 5.11+, Debian trixie kernel satisfies this).
# No CAP_SYS_ADMIN required; Podman auto-detects kernel support and falls back to fuse-overlayfs if absent.
# If the agent-home volume is on a btrfs filesystem, switch driver to "btrfs" and ensure btrfs-progs
# is in the image (already installed) — the btrfs driver uses subvolumes and requires no overlay at all.
driver = "overlay"

[storage.options.overlay]
# Required for rootless overlay inside a container: mounts are performed via mount(2) in the user
# namespace rather than via a setuid helper, which avoids the locked-mount MakeRPrivate failure
# that breaks the VFS chroot-archive code path.
mount_program = ""
mountopt = "nodev"
